name: Deploy n8n workflows

on:
  push:
    paths: ['workflows/**', 'scripts/deploy.sh']
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1
        id: secrets
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy workflows to prod n8n
        env:
          N8N_URL: ${{ steps.secrets.outputs.JOB_HUNTER_N8N_API_URL }}
          N8N_KEY: ${{ steps.secrets.outputs.JOB_HUNTER_N8N_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ steps.secrets.outputs.JOB_HUNTER_N8N_TELEGRAM_BOT_TOKEN }}
        run: bash scripts/deploy.sh
